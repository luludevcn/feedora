<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#dbeafe"/>
  <rect x="20" y="20" width="360" height="260" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="50" cy="50" r="20" fill="#3b82f6"/>
  <text x="50" y="55" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">💬</text>
  <text x="80" y="55" font-family="Arial" font-size="14" fill="#1e293b" font-weight="bold">Post-launch Feedback</text>
  <rect x="30" y="80" width="340" height="30" rx="4" fill="#eff6ff"/>
  <text x="40" y="100" font-family="Arial" font-size="12" fill="#1e40af">First impressions? How was your experience?</text>
  <rect x="30" y="120" width="340" height="30" rx="4" fill="#eff6ff"/>
  <text x="40" y="140" font-family="Arial" font-size="12" fill="#1e40af">What's missing? What would make it better?</text>
  <rect x="30" y="160" width="340" height="30" rx="4" fill="#eff6ff"/>
  <text x="40" y="180" font-family="Arial" font-size="12" fill="#1e40af">Would you recommend this to others?</text>
  <rect x="30" y="210" width="120" height="35" rx="6" fill="#3b82f6"/>
  <text x="90" y="232" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">Send Feedback</text>
  <text x="320" y="260" font-family="Arial" font-size="10" fill="#64748b">Real-time notifications</text>
